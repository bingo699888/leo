<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 管理後台 - 臺南市鹽水獅子會捐血叫號</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }

    /* 登入 */
    .login-card {
      background: white; border-radius: 20px; padding: 40px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center;
      margin-top: 60px;
    }
    .login-card h2 { font-size: 22px; margin-bottom: 24px; color: #333; }
    .login-card .logo { font-size: 48px; margin-bottom: 16px; }
    .login-card input {
      width: 100%; padding: 16px; border: 2px solid #e0e0e0;
      border-radius: 12px; font-size: 18px; text-align: center;
      margin-bottom: 16px; outline: none; box-sizing: border-box;
    }
    .login-card input:focus { border-color: #c62828; }
    .login-card button {
      width: 100%; padding: 16px; background: #c62828; color: white;
      border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold;
    }
    .login-card button:hover { background: #b71c1c; }
    .login-error { color: #e53935; font-size: 14px; margin-top: 12px; }

    /* 管理面板 */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .panel-header {
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white; border-radius: 20px 20px 0 0;
      padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
    }
    .panel-header h2 { font-size: 18px; }
    .role-badge {
      background: rgba(255,255,255,0.25); padding: 4px 12px;
      border-radius: 20px; font-size: 12px; margin-left: 8px;
    }
    .logout-btn {
      background: rgba(255,255,255,0.2); color: white; border: none;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }

    .panel-body { background: white; border-radius: 0 0 20px 20px; padding: 24px; }

    .connected-badge {
      display: inline-block; background: #4caf50; color: white;
      padding: 4px 14px; border-radius: 20px; font-size: 12px; margin-bottom: 16px;
    }

    /* 卡片 */
    .card {
      background: #fafafa; border-radius: 16px; padding: 20px;
      margin-bottom: 20px; border: 1px solid #eee;
    }
    .card-title {
      font-size: 15px; font-weight: bold; color: #333;
      margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #c62828;
      display: flex; align-items: center; gap: 8px;
    }

    /* 叫號 */
    .call-display {
      background: linear-gradient(135deg, #fff8e1, #fff3e0);
      border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 16px;
    }
    .call-display .label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .call-display .number { font-size: 72px; font-weight: 900; color: #c62828; line-height: 1; }
    .call-display .unit { font-size: 18px; color: #c62828; }
    .call-input-row { display: flex; gap: 10px; }
    .call-input-row input {
      flex: 1; padding: 14px 16px; border: 2px solid #e0e0e0;
      border-radius: 12px; font-size: 18px; outline: none;
    }
    .call-input-row input:focus { border-color: #c62828; }
    .call-input-row button {
      padding: 14px 24px; background: #c62828; color: white;
      border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: bold;
    }
    .call-input-row button:hover { background: #b71c1c; }
    .call-note { font-size: 12px; color: #aaa; margin-top: 8px; text-align: center; }

    /* 公告 */
    .ann-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .ann-item textarea {
      flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; resize: none; outline: none; font-family: inherit; background: #fff;
    }
    .ann-item textarea:focus { border-color: #c62828; }
    .ann-item .del-btn {
      padding: 10px 12px; background: #ffebee; color: #c62828;
      border: none; border-radius: 10px; cursor: pointer; font-size: 16px; flex-shrink: 0;
    }
    .ann-item .del-btn:hover { background: #ffcdd2; }
    .add-ann-btn {
      width: 100%; padding: 14px; background: white; color: #666;
      border: 2px dashed #ccc; border-radius: 12px; cursor: pointer; font-size: 14px;
    }
    .add-ann-btn:hover { border-color: #c62828; color: #c62828; }

    /* 活動圖片上傳 */
    .image-preview {
      width: 100%; max-height: 200px; object-fit: cover;
      border-radius: 12px; margin-bottom: 10px; display: none;
    }
    .image-preview.visible { display: block; }
    .upload-area {
      border: 2px dashed #ccc; border-radius: 12px; padding: 24px; text-align: center;
      cursor: pointer; transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #c62828; }
    .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
    .upload-area .text { font-size: 14px; color: #888; }
    .upload-area .text span { color: #c62828; text-decoration: underline; }
    .image-url-row { display: flex; gap: 8px; margin-top: 10px; }
    .image-url-row input {
      flex: 1; padding: 10px 12px; border: 2px solid #e0e0e0;
      border-radius: 10px; font-size: 14px; outline: none;
    }
    .image-url-row input:focus { border-color: #c62828; }
    .image-url-row button {
      padding: 10px 16px; background: #1565c0; color: white;
      border: none; border-radius: 10px; cursor: pointer; font-size: 14px;
    }
    .image-hint { font-size: 12px; color: #aaa; margin-top: 6px; }
    #imageInput { display: none; }

    /* 儲存 */
    .save-btn {
      width: 100%; padding: 18px; background: #4caf50; color: white;
      border: none; border-radius: 14px; font-size: 16px; cursor: pointer; font-weight: bold;
    }
    .save-btn:hover { background: #388e3c; }

    /* 訊息 */
    .msg { font-size: 13px; margin-top: 10px; text-align: center; border-radius: 8px; padding: 10px; }
    .msg.ok { color: #2e7d32; background: #e8f5e9; }
    .msg.err { color: #c62828; background: #ffebee; }

    /* 密碼變更 */
    .password-section { margin-top: 24px; }
    .password-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .password-row input {
      flex: 1; padding: 10px 12px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .password-row input:focus { border-color: #c62828; }
    .password-row button {
      padding: 10px 16px; background: #1565c0; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 13px;
    }

    /* 帳號管理 */
    .user-item {
      display: flex; align-items: center; gap: 8px;
      background: #f5f5f5; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
    }
    .user-item .info { flex: 1; }
    .user-item .name { font-size: 14px; font-weight: bold; color: #333; }
    .user-item .role-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
    .user-item .role-tag.super { background: #fff3e0; color: #e65100; }
    .user-item .role-tag.normal { background: #e3f2fd; color: #1565c0; }
    .user-item .del-btn {
      padding: 6px 12px; background: #ffebee; color: #c62828;
      border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .user-item .del-btn:hover { background: #ffcdd2; }
    .user-item .del-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .add-user-btn {
      width: 100%; padding: 14px; background: white; color: #666;
      border: 2px dashed #ccc; border-radius: 12px; cursor: pointer; font-size: 14px; margin-top: 8px;
    }
    .add-user-btn:hover { border-color: #c62828; color: #c62828; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white; border-radius: 20px; padding: 32px; width: 90%; max-width: 400px;
    }
    .modal-box h3 { font-size: 18px; margin-bottom: 20px; text-align: center; }
    .modal-box input, .modal-box select {
      width: 100%; padding: 12px; border: 2px solid #e0e0e0;
      border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; box-sizing: border-box;
    }
    .modal-box input:focus, .modal-box select:focus { border-color: #c62828; }
    .modal-box .btn-row { display: flex; gap: 10px; }
    .modal-box .btn-cancel {
      flex: 1; padding: 14px; background: #f5f5f5; color: #666;
      border: none; border-radius: 12px; cursor: pointer; font-size: 15px;
    }
    .modal-box .btn-confirm {
      flex: 1; padding: 14px; background: #c62828; color: white;
      border: none; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: bold;
    }
    .info-text { font-size: 12px; color: #999; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container">

  <!-- 登入 -->
  <div class="login-card" id="loginCard">
    <div class="logo">🩸</div>
    <h2>管理後台登入</h2>
    <input type="text" id="usernameInput" placeholder="帳號（可空白）" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" id="passwordInput" placeholder="請輸入管理密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登 入</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint" style="font-size:13px;color:#999;margin-top:16px;"></div>
  </div>

  <!-- 管理面板 -->
  <div class="admin-panel" id="adminPanel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;">
        <h2>🔧 管理後台</h2>
        <span class="role-badge" id="roleBadge">一般管理者</span>
      </div>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
    <div class="panel-body">

      <span class="connected-badge">✅ 已連線</span>

      <!-- 叫號更新 -->
      <div class="card">
        <div class="card-title">📢 叫號更新</div>
        <div class="call-display">
          <div class="label">目前叫到</div>
          <div class="number" id="currentCallDisplay">--</div>
          <div class="unit">號</div>
        </div>
        <div class="call-input-row">
          <input type="number" id="newCallInput" placeholder="輸入新號碼，例如 160">
          <button onclick="updateCall()">更新</button>
          <button onclick="resetCall()" style="background:#e53935;margin-left:4px;">歸0</button>
        </div>
        <div class="call-note">一般管理者與超級管理者皆可使用</div>
      </div>

      <!-- 超級管理者專區 -->
      <div id="superSection" style="display:none;">

        <!-- 活動圖片上傳 -->
        <div class="card">
          <div class="card-title">🖼️ 活動圖片</div>
          <img class="image-preview" id="imagePreview" src="" alt="預覽" onclick="document.getElementById('imageInput').click()">
          <div class="upload-area" onclick="document.getElementById('imageInput').click()">
            <div class="icon">📷</div>
            <div class="text">點擊上傳圖片，或<span>選擇檔案</span></div>
          </div>
          <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(this)">
          <div class="image-url-row">
            <input type="text" id="imageUrlInput" placeholder="或直接輸入圖片網址" oninput="handleUrlInput(this)">
            <button onclick="saveImageUrl()">使用網址</button>
          </div>
          <div class="image-hint">支援 JPG/PNG/GIF，圖片建議寬度 800px 以上</div>
          <div class="msg" id="uploadMsg" style="margin-top:10px;"></div>
        </div>

        <!-- 公告管理 -->
        <div class="card">
          <div class="card-title">📋 公告管理</div>
          <div class="info-text">新增或編輯公告，前台將自動顯示</div>
          <div id="annList"></div>
          <button class="add-ann-btn" onclick="addAnn()">＋ 新增公告</button>
        </div>

        <!-- 帳號管理 -->
        <div class="card">
          <div class="card-title">👥 帳號管理</div>
          <div id="userList"></div>
          <button class="add-user-btn" onclick="showAddUserModal()">＋ 新增管理者帳號</button>
        </div>

        <!-- 密碼變更 -->
        <div class="card">
          <div class="card-title">🔐 變更密碼（超級管理者）</div>
          <div class="password-row">
            <input type="password" id="oldPwdInput" placeholder="舊密碼">
            <input type="password" id="newPwdInput" placeholder="新密碼（至少4位）">
            <button onclick="changePassword()">變更</button>
          </div>
          <div class="msg" id="pwdMsg"></div>
        </div>

      </div>

      <button class="save-btn" id="saveBtn" onclick="saveAll()">💾 儲存公告變更</button>
      <div class="msg" id="saveMsg"></div>

    </div>
  </div>
</div>

<!-- 新增帳號 Modal -->
<div class="modal-overlay" id="addUserModal">
  <div class="modal-box">
    <h3>＋ 新增管理者帳號</h3>
    <input type="text" id="newUsername" placeholder="帳號名稱">
    <input type="password" id="newUserPwd" placeholder="登入密碼（至少4位）">
    <select id="newUserRole">
      <option value="normal">👤 一般管理者（只能輸入號碼）</option>
      <option value="super">⭐ 超級管理者（全部功能）</option>
    </select>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeAddUserModal()">取消</button>
      <button class="btn-confirm" onclick="doAddUser()">新增</button>
    </div>
    <div class="msg" id="addUserMsg" style="margin-top:12px;"></div>
  </div>
</div>

<script>
  let password = '';
  let currentRole = 'normal';
  let currentUsername = '';
  let currentCall = 0;
  let announcements = [];
  let eventImage = '';
  let pendingImageFile = null;

  async function doLogin() {
    const username = document.getElementById('usernameInput').value.trim();
    const pwd = document.getElementById('passwordInput').value;
    if (!pwd) return;
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username || undefined, password: pwd })
    });
    const r = await resp.json();
    if (r.ok) {
      password = pwd;
      currentRole = r.role || 'normal';
      currentUsername = username;
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      document.getElementById('roleBadge').textContent =
        currentRole === 'super' ? '⭐ 超級管理者' : '👤 一般管理者';
      document.getElementById('superSection').style.display = currentRole === 'super' ? 'block' : 'none';
      loadData();
      if (currentRole === 'super') loadUsers();
    } else {
      document.getElementById('loginError').textContent = '⚠️ ' + (r.message || '密碼錯誤');
    }
  }

  function logout() {
    password = '';
    currentRole = 'normal';
    document.getElementById('adminPanel').classList.remove('active');
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').textContent = '';
  }

  async function loadData() {
    const resp = await fetch('/api/data');
    const d = await resp.json();
    currentCall = d.currentCall || 0;
    eventImage = d.eventImage || '';
    announcements = (d.announcements || []).map(a => a.content || a);
    render();
  }

  function render() {
    document.getElementById('currentCallDisplay').textContent = currentCall || '尚未開始';
    const preview = document.getElementById('imagePreview');
    preview.src = eventImage;
    preview.className = 'image-preview' + (eventImage ? ' visible' : '');
    document.getElementById('imageUrlInput').value = eventImage;
    renderAnns();
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderAnns() {
    const el = document.getElementById('annList');
    el.innerHTML = announcements.map((c, i) =>
      '<div class="ann-item"><textarea rows="2" id="ann' + i + '">' + esc(c) + '</textarea>' +
      '<button class="del-btn" onclick="delAnn(' + i + ')">✕</button></div>'
    ).join('');
  }

  function addAnn() {
    announcements.push('');
    renderAnns();
    const idx = announcements.length - 1;
    document.getElementById('ann' + idx).focus();
  }

  function delAnn(i) {
    announcements.splice(i, 1);
    renderAnns();
  }

  async function resetCall() {
    if (!confirm('確定要歸0嗎？')) return;
    const resp = await fetch('/api/reset-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUsername, admin_password: password })
    });
    const r = await resp.json();
    const msg = document.getElementById('saveMsg');
    if (r.ok) {
      document.getElementById('currentCallDisplay').textContent = '0';
      document.getElementById('newCallInput').value = '';
      msg.textContent = '✅ 已歸0';
      msg.className = 'msg';
    } else {
      msg.textContent = '⚠️ ' + (r.message || '失敗');
      msg.className = 'msg err';
    }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }

  async function updateCall() {
    const val = parseInt(document.getElementById('newCallInput').value);
    if (!val || val <= 0) return;
    const resp = await fetch('/api/update-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ call: val, username: currentUsername, admin_password: password })
    });
    const r = await resp.json();
    const msg = document.getElementById('saveMsg');
    if (r.ok) {
      currentCall = r.currentCall;
      document.getElementById('newCallInput').value = '';
      document.getElementById('currentCallDisplay').textContent = currentCall;
      msg.textContent = '✅ 已更新為 ' + r.currentCall + ' 號';
      msg.className = 'msg ok';
    } else {
      msg.textContent = '⚠️ ' + (r.message || '更新失敗');
      msg.className = 'msg err';
    }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }

  // 圖片選擇
  function handleImageSelect(input) {
    if (!input.files || !input.files[0]) return;
    pendingImageFile = input.files[0];
    // 預覽
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('imagePreview');
      preview.src = e.target.result;
      preview.className = 'image-preview visible';
    };
    reader.readAsDataURL(pendingImageFile);
    // 直接上傳
    uploadImage(pendingImageFile);
  }

  function handleUrlInput(input) {
    eventImage = input.value;
    const preview = document.getElementById('imagePreview');
    preview.src = eventImage;
    preview.className = 'image-preview' + (eventImage ? ' visible' : '');
  }

  async function uploadImage(file) {
    const msgEl = document.getElementById('uploadMsg');
    if (currentRole !== 'super') {
      msgEl.textContent = '⚠️ 只有超級管理者才能上傳圖片';
      msgEl.className = 'msg err';
      setTimeout(() => { msgEl.textContent = ''; }, 3000);
      return;
    }
    msgEl.textContent = '⏳ 上傳中...';
    msgEl.className = 'msg';
    const formData = new FormData();
    formData.append('image', file);
    formData.append('admin_password', password);
    try {
      const resp = await fetch('/api/upload-image', { method: 'POST', body: formData });
      const r = await resp.json();
      if (r.ok) {
        eventImage = r.url;
        document.getElementById('imageUrlInput').value = eventImage;
        msgEl.textContent = '✅ 上傳成功！';
        msgEl.className = 'msg ok';
      } else {
        msgEl.textContent = '⚠️ ' + (r.message || '上傳失敗');
        msgEl.className = 'msg err';
      }
    } catch(e) {
      msgEl.textContent = '⚠️ 上傳失敗：' + e.message;
      msgEl.className = 'msg err';
    }
    setTimeout(() => { msgEl.textContent = ''; }, 4000);
  }

  async function saveImageUrl() {
    if (currentRole !== 'super') {
      const msgEl = document.getElementById('uploadMsg');
      msgEl.textContent = '⚠️ 只有超級管理者才能設定圖片';
      msgEl.className = 'msg err';
      setTimeout(() => { msgEl.textContent = ''; }, 3000);
      return;
    }
    const url = document.getElementById('imageUrlInput').value.trim();
    eventImage = url;
    const resp = await fetch('/api/update-event-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ eventImage: url, username: currentUsername, admin_password: password })
    });
    const r = await resp.json();
    const msgEl = document.getElementById('uploadMsg');
    if (r.ok) {
      msgEl.textContent = '✅ 圖片已設定';
      msgEl.className = 'msg ok';
    } else {
      msgEl.textContent = '⚠️ ' + (r.message || '設定失敗');
      msgEl.className = 'msg err';
    }
    setTimeout(() => { msgEl.textContent = ''; }, 3000);
  }

  async function saveAll() {
    if (currentRole !== 'super') {
      const msg = document.getElementById('saveMsg');
      msg.textContent = '⚠️ 只有超級管理者才能修改公告';
      msg.className = 'msg err';
      setTimeout(() => { msg.textContent = ''; }, 3000);
      return;
    }
    announcements = [];
    document.querySelectorAll('.ann-item textarea').forEach(el => {
      const v = el.value.trim();
      if (v) announcements.push(v);
    });
    const resp = await fetch('/api/update-announcements', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ announcements, username: currentUsername, admin_password: password })
    });
    const r = await resp.json();
    const msg = document.getElementById('saveMsg');
    if (r.ok) {
      msg.textContent = '✅ 儲存成功！';
      msg.className = 'msg ok';
    } else {
      msg.textContent = '⚠️ ' + (r.message || '儲存失敗');
      msg.className = 'msg err';
    }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }

  async function changePassword() {
    const oldPwd = document.getElementById('oldPwdInput').value;
    const newPwd = document.getElementById('newPwdInput').value;
    if (!newPwd || newPwd.length < 4) {
      const m = document.getElementById('pwdMsg');
      m.textContent = '⚠️ 新密碼至少4位';
      m.className = 'msg err';
      setTimeout(() => { m.textContent = ''; }, 3000);
      return;
    }
    const resp = await fetch('/api/update-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd, password: password })
    });
    const r = await resp.json();
    const m = document.getElementById('pwdMsg');
    if (r.ok) {
      m.textContent = '✅ 密碼已更改';
      m.className = 'msg ok';
      document.getElementById('oldPwdInput').value = '';
      document.getElementById('newPwdInput').value = '';
    } else {
      m.textContent = '⚠️ ' + (r.message || '更改失敗');
      m.className = 'msg err';
    }
    setTimeout(() => { m.textContent = ''; }, 3000);
  }

  // ── 帳號管理 ──
  async function loadUsers() {
    if (currentRole !== 'super') return;
    const resp = await fetch('/api/admin/users?admin_password=' + encodeURIComponent(password));
    const d = await resp.json();
    renderUsers(d.users || []);
  }

  function renderUsers(users) {
    const el = document.getElementById('userList');
    el.innerHTML = users.map(u => {
      const isSelf = u.username === 'admin';
      return '<div class="user-item">' +
        '<div class="info"><span class="name">' + esc(u.username) + (isSelf ? '（自己）' : '') + '</span>' +
        '<span class="role-tag ' + u.role + '">' + (u.role === 'super' ? '⭐ 超級管理者' : '👤 一般管理者') + '</span></div>' +
        (isSelf ? '<button class="del-btn" disabled>✕</button>' :
         '<button class="del-btn" onclick="delUser(' + u.id + ')">✕</button>') +
        '</div>';
    }).join('');
  }

  function showAddUserModal() {
    document.getElementById('addUserModal').classList.add('active');
    document.getElementById('newUsername').value = '';
    document.getElementById('newUserPwd').value = '';
    document.getElementById('newUserRole').value = 'normal';
    document.getElementById('addUserMsg').textContent = '';
    document.getElementById('newUsername').focus();
  }

  function closeAddUserModal() {
    document.getElementById('addUserModal').classList.remove('active');
  }

  async function doAddUser() {
    if (currentRole !== 'super') {
      const m = document.getElementById('addUserMsg');
      m.textContent = '⚠️ 只有超級管理者才能新增帳號';
      m.className = 'msg err';
      return;
    }
    const username = document.getElementById('newUsername').value.trim();
    const pwd = document.getElementById('newUserPwd').value;
    const role = document.getElementById('newUserRole').value;
    if (!username || username.length < 2) {
      const m = document.getElementById('addUserMsg');
      m.textContent = '⚠️ 帳號至少2個字元';
      m.className = 'msg err';
      return;
    }
    if (!pwd || pwd.length < 4) {
      const m = document.getElementById('addUserMsg');
      m.textContent = '⚠️ 密碼至少4位';
      m.className = 'msg err';
      return;
    }
    const resp = await fetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password: pwd, role, admin_password: password })
    });
    const r = await resp.json();
    const m = document.getElementById('addUserMsg');
    if (r.ok) {
      m.textContent = '✅ ' + r.message;
      m.className = 'msg ok';
      setTimeout(() => { closeAddUserModal(); loadUsers(); }, 1000);
    } else {
      m.textContent = '⚠️ ' + (r.message || '新增失敗');
      m.className = 'msg err';
    }
  }

  async function delUser(id) {
    if (!confirm('確定要刪除這個帳號嗎？')) return;
    const resp = await fetch('/api/admin/users/' + id + '?admin_password=' + encodeURIComponent(password), { method: 'DELETE' });
    const r = await resp.json();
    if (r.ok) { loadUsers(); }
    else { alert('⚠️ ' + (r.message || '刪除失敗')); }
  }
</script>
</body>
</html>
