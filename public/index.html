<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🩸 臺南市鹽水獅子會 捐血叫號</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #fff8e1 50%, #fce4ec 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white;
      text-align: center;
      padding: 20px 16px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(198,40,40,0.3);
    }
    .header .org { font-size: 18px; opacity: 0.9; letter-spacing: 2px; font-weight: 500; }
    .header h1 { font-size: 18px; margin-top: 4px; letter-spacing: 3px; font-weight: 700; }
    .main-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      margin: -20px 16px 16px;
      width: calc(100% - 32px);
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      text-align: center;
    }
    .call-label { font-size: 13px; color: #999; letter-spacing: 3px; margin-bottom: 8px; }
    .call-number { font-size: 88px; font-weight: 900; color: #c62828; line-height: 1; text-shadow: 2px 2px 0 #ffcdd2; }
    .call-unit { font-size: 20px; color: #c62828; margin-top: 4px; }
    .status-badge {
      display: inline-block; background: #4caf50; color: white;
      padding: 6px 20px; border-radius: 20px; font-size: 13px; margin-top: 14px;
    }
    .status-badge.waiting { background: #ff9800; }
    .announce-section { margin-top: 24px; text-align: left; }
    .announce-title {
      font-size: 15px; font-weight: bold; color: #333; margin-bottom: 12px;
      padding-left: 12px; border-left: 4px solid #c62828;
    }
    .announce-list { list-style: none; }
    .announce-list li {
      background: #fff8e1; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 10px; font-size: 14px; color: #333; border-left: 4px solid #ffb300;
    }
    .footer { margin-top: auto; padding: 20px; text-align: center; font-size: 12px; color: #aaa; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .live-dot { display:inline-block; width:8px; height:8px; background:#4caf50; border-radius:50%; margin-right:6px; animation: pulse 1.5s infinite; }
    .event-image { margin: 16px 0; width: 100%; max-width: 480px; }
    .event-image img { width: 100%; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: none; }
    .event-image img.visible { display: block; }
    .update-info { font-size: 11px; color: #bbb; margin-top: 4px; }
  </style>
</head>
<body>

<div class="header" style="display:flex;align-items:center;">
    <img src="/lions-logo.png" alt="Lions Logo" style="width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);object-fit:cover;margin-right:12px;flex-shrink:0;">
    <div>
      <div class="org">國際獅子會 300-E1 區</div>
  <h1>🩸 臺南市鹽水獅子會 捐血活動</h1>
</div>

<div class="main-card">
  <div class="call-label">目前叫到</div>
  <div class="call-number" id="callNumber">--</div>
  <div class="call-unit">號</div>
  <div class="status-badge waiting" id="statusBadge">⏳ 等待叫號</div>

  <!-- 活動圖片 -->
  <div class="event-image">
    <img id="eventImg" src="" alt="活動圖片">
  </div>

  <!-- 公告 -->
  <div class="announce-section" id="announceSection">
    <div class="announce-title">📢 最新公告</div>
    <ul class="announce-list" id="announceList">
      <li>載入中...</li>
    </ul>
  </div>
</div>

<div class="footer">
  <div><span class="live-dot"></span>每分鐘自動更新</div>
  <div class="update-info" id="updateInfo"></div>
</div>

<script>
  const REFRESH_INTERVAL = 60000; // 1 分鐘

  async function loadData() {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const resp = await fetch('/api/data?_=' + Date.now(), { signal: controller.signal });
      clearTimeout(timeout);
      if (!resp.ok) throw new Error('network error');
      const d = await resp.json();
      updateUI(d);
      document.getElementById('updateInfo').textContent = '✅ 最後更新：刚刚';
    } catch(e) {
      document.getElementById('updateInfo').textContent = '⚠️ 無法取得資料 (' + e.message + ')';
    }
  }

  function updateUI(d) {
    const num = d.currentCall || 0;
    document.getElementById('callNumber').textContent = num === 0 ? '--' : num;

    const badge = document.getElementById('statusBadge');
    if (num === 0) {
      badge.className = 'status-badge waiting';
      badge.textContent = '⏳ 等待叫號';
    } else {
      badge.className = 'status-badge';
      badge.textContent = '✅ 叫號中';
    }

    // 活動圖片
    const img = document.getElementById('eventImg');
    if (d.eventImage) {
      img.src = d.eventImage;
      img.className = 'visible';
    } else {
      img.className = '';
    }

    // 公告
    const list = document.getElementById('announceList');
    if (d.announcements && d.announcements.length > 0) {
      list.innerHTML = d.announcements.map(a =>
        '<li>' + escHtml(a.content || a) + '</li>'
      ).join('');
    } else {
      list.innerHTML = '<li>目前沒有公告</li>';
    }

    // 更新時間
    if (d.lastUpdated) {
      const t = new Date(d.lastUpdated);
      const now = new Date();
      const diff = Math.floor((now - t) / 1000);
      if (diff < 60) {
        document.getElementById('updateInfo').textContent = '📡 最後更新：' + diff + ' 秒前';
      } else {
        document.getElementById('updateInfo').textContent = '📡 最後更新：' + Math.floor(diff/60) + ' 分鐘前';
      }
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 初始載入
  loadData();
  // 每分鐘自動更新
  setInterval(loadData, REFRESH_INTERVAL);
</script>

</body>
</html>
